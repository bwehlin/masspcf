<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coverage Reports</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0c10;
  --surface: #111318;
  --border: #1e2230;
  --accent: #00e5a0;
  --accent-dim: rgba(0,229,160,0.12);
  --text: #e2e8f0;
  --muted: #5a6480;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Syne', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 860px;
  margin: 0 auto;
  padding: 60px 24px 80px;
}

header { margin-bottom: 56px; }

.eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.eyebrow::before {
  content: '';
  display: inline-block;
  width: 24px;
  height: 2px;
  background: var(--accent);
}

h1 {
  font-family: var(--sans);
  font-size: clamp(36px, 6vw, 56px);
  font-weight: 800;
  line-height: 1.05;
  letter-spacing: -0.02em;
  margin-bottom: 16px;
}

h1 span { color: var(--accent); }

.subtitle {
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 0.02em;
}

.reports-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.report-card {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 20px 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid transparent;
  text-decoration: none;
  color: inherit;
  transition: border-color 0.15s, background 0.15s, transform 0.15s;
  position: relative;
  overflow: hidden;
}

.report-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--accent-dim);
  opacity: 0;
  transition: opacity 0.15s;
}

.report-card:hover {
  background: #13161e;
}

.report-card:hover::after { opacity: 1; }
.report-card.latest { border-left-color: var(--accent); }

.badge {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--bg);
  background: var(--accent);
  padding: 3px 8px;
  border-radius: 2px;
  white-space: nowrap;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
}

.report-index {
  font-size: 11px;
  color: var(--muted);
  width: 20px;
  text-align: right;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
}

.report-info {
  flex: 1;
  min-width: 0;
  position: relative;
  z-index: 1;
}

.report-label {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.report-links {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
}

.report-link {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: 3px;
  border: 1px solid var(--border);
  color: var(--muted);
  text-decoration: none;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
  white-space: nowrap;
}

.report-link:hover {
  color: var(--bg);
  background: var(--accent);
  border-color: var(--accent);
}

.empty {
  padding: 60px 24px;
  text-align: center;
  color: var(--muted);
  border: 1px dashed var(--border);
  font-size: 14px;
}

footer {
  margin-top: 64px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--muted);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

.dot {
  display: inline-block;
  width: 7px;
  height: 7px;
  background: var(--accent);
  border-radius: 50%;
  margin-right: 8px;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="eyebrow">C++ &amp; Python Coverage</div>
      <h1>Coverage<br /><span>Reports</span></h1>
      <p class="subtitle">Last 5 runs — click a label to view that report</p>
    </header>

    <div class="reports-list">
      
    <div class="report-card latest">
      <span class="report-index">#1</span>
      <div class="report-info">
        <div class="report-label">2026-03-04 10:46:02 UTC — 293b779</div>
      </div>
      <span class="badge">Latest</span>
      <div class="report-links">
        <a class="report-link" href="reports/2026-03-04_10-46-02_293b779/cpp/coverage.html">C++</a>
        <a class="report-link" href="reports/2026-03-04_10-46-02_293b779/python/index.html">Python</a>
      </div>
    </div>
    </div>

    <footer>
      <span><span class="dot"></span>Auto-generated on each push</span>
      <span>Keeping last 5 reports</span>
    </footer>
  </div>
</body>
</html>
