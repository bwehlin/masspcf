<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coverage Reports</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f8f9fb;
  --surface: #ffffff;
  --surface-hover: #f1f4f9;
  --border: #e2e7ef;
  --border-strong: #c8d1de;
  --accent: #2563eb;
  --accent-light: #eff4ff;
  --accent-mid: #bfcffe;
  --text: #111827;
  --muted: #6b7280;
  --subtle: #9ca3af;
  --sans: 'Inter', sans-serif;
  --mono: 'DM Mono', monospace;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 780px;
  margin: 0 auto;
  padding: 64px 24px 96px;
}

header {
  margin-bottom: 48px;
  padding-bottom: 32px;
  border-bottom: 1px solid var(--border);
}

.eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
}

h1 {
  font-size: clamp(26px, 4vw, 36px);
  font-weight: 700;
  line-height: 1.15;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-bottom: 10px;
}

.subtitle {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.5;
}

.reports-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.report-card {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
}

.report-card:hover {
  border-color: var(--border-strong);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
  background: var(--surface-hover);
}

.report-card.latest {
  border-color: var(--accent-mid);
  background: var(--accent-light);
}

.report-card.latest:hover {
  border-color: var(--accent);
  box-shadow: 0 2px 8px rgba(37, 99, 235, 0.1);
}

.badge {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--accent);
  background: var(--accent-mid);
  padding: 3px 8px;
  border-radius: 99px;
  white-space: nowrap;
  flex-shrink: 0;
}

.report-index {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--subtle);
  width: 24px;
  text-align: right;
  flex-shrink: 0;
}

.report-info {
  flex: 1;
  min-width: 0;
}

.report-label {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-family: var(--mono);
}

.report-links {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

.report-link {
  font-size: 12px;
  font-weight: 500;
  padding: 5px 14px;
  border-radius: 6px;
  border: 1px solid var(--border-strong);
  color: var(--muted);
  background: var(--surface);
  text-decoration: none;
  transition: color 0.12s, border-color 0.12s, background 0.12s;
  white-space: nowrap;
}

.report-link:hover {
  color: var(--accent);
  border-color: var(--accent);
  background: var(--accent-light);
}

.empty {
  padding: 48px 24px;
  text-align: center;
  color: var(--muted);
  border: 1px dashed var(--border-strong);
  border-radius: 8px;
  font-size: 14px;
}

footer {
  margin-top: 56px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--subtle);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

.dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: #22c55e;
  border-radius: 50%;
  margin-right: 7px;
  vertical-align: middle;
  animation: pulse 2.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="eyebrow">C++ &amp; Python Coverage</div>
      <h1>Coverage<br /><span>Reports</span></h1>
      <p class="subtitle">Last 5 runs — click a label to view that report</p>
    </header>

    <div class="reports-list">
      
    <div class="report-card latest">
      <span class="report-index">#1</span>
      <div class="report-info">
        <div class="report-label">2026-03-04 10:54:25 UTC — d3b0d96</div>
      </div>
      <span class="badge">Latest</span>
      <div class="report-links">
        <a class="report-link" href="reports/2026-03-04_10-54-25_d3b0d96/cpp/coverage.html">C++</a>
        <a class="report-link" href="reports/2026-03-04_10-54-25_d3b0d96/python/index.html">Python</a>
      </div>
    </div>

    <div class="report-card">
      <span class="report-index">#2</span>
      <div class="report-info">
        <div class="report-label">2026-03-04 10:46:02 UTC — 293b779</div>
      </div>
      
      <div class="report-links">
        <a class="report-link" href="reports/2026-03-04_10-46-02_293b779/cpp/coverage.html">C++</a>
        <a class="report-link" href="reports/2026-03-04_10-46-02_293b779/python/index.html">Python</a>
      </div>
    </div>
    </div>

    <footer>
      <span><span class="dot"></span>Auto-generated on each push</span>
      <span>Keeping last 5 reports</span>
    </footer>
  </div>
</body>
</html>
