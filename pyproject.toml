[build-system]
requires = [
    'scikit-build-core>=0.9',
    'numpy>=2.0',
    'pybind11_stubgen',
    'tomli',
]
build-backend = "scikit_build_core.build"

[project]
name = "masspcf"
version = "0.4.0"
authors = [ { name="Bjorn H. Wehlin", email="bwehlin@kth.se" } ]
description = "Massively parallel computations for piecewise constant functions"
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE"]
requires-python = ">=3.10"
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: C++",
    "Environment :: GPU :: NVIDIA CUDA",
    "Topic :: Scientific/Engineering"
]
dependencies = [ "numpy>=2.0", "tqdm" ]

[project.urls]
Homepage = "https://github.com/bwehlin/masspcf"
Issues = "https://github.com/bwehlin/masspcf/issues"

[tool.cibuildwheel]
test-sources = ["test"]
test-requires = "pytest"
#test-command = "python -m pytest ./test"
test-command = """
python - <<EOF
import zipfile
import os
import glob
import subprocess

wheel_dir = os.environ['CIBW_REPAIRED_WHEEL_DIR']
project_name = os.environ['CIBW_PROJECT_NAME']

whl_files = glob.glob(os.path.join(wheel_dir, f"{project_name}-*.whl"))
whl_path = whl_files[0]

print(f"Contents of {whl_path}:")
with zipfile.ZipFile(whl_path, 'r') as zf:
    for f in zf.namelist():
        print(f)

# Run tests on copied tests folder
#subprocess.check_call(["pytest", "./test"]) #python -m pytest ./test
EOF
"""
