repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.3
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pocc/pre-commit-hooks
    rev: v1.3.5
    hooks:
      - id: cppcheck
        args:
          - --std=c++20
          - --suppress=missingIncludeSystem
          - --suppress=unmatchedSuppression
        files: ^(src|include)/
        types_or: [c++]
