name: BuildAndPublishPyPI

on: [workflow_dispatch]

jobs:
  check_version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check version not already published
        shell: bash
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          PACKAGE=$(grep '^name = ' pyproject.toml | sed 's/name = "\(.*\)"/\1/')
          echo "Checking if $PACKAGE==$VERSION is already on PyPI..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://pypi.org/pypi/$PACKAGE/$VERSION/json)
          if [ "$STATUS" == "200" ]; then
            echo "❌ $PACKAGE==$VERSION already exists on PyPI!"
            exit 1
          fi
          echo "✅ $PACKAGE==$VERSION not found on PyPI, proceeding..."

  analysis:
    permissions:
      contents: write
    uses: ./.github/workflows/analysis.yaml
    needs: check_version

  build:
    uses: ./.github/workflows/wheels.yaml
    needs: check_version

  compare:
    runs-on: ubuntu-latest
    needs: build
    if: github.actor == 'bwehlin'

    steps:
      - uses: actions/checkout@v6

      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          name: wheels
          path: dist/

      - name: Compare wheels
        run: |
          set -o pipefail
          echo '```' >> $GITHUB_STEP_SUMMARY
          python -u .github/scripts/compare_wheels.py -v dist/ | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  publish:
    runs-on: ubuntu-latest
    needs: [compare, analysis]
    if: github.actor == 'bwehlin'
    environment:
      name: pypi
      url: https://pypi.org/p/masspcf
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          name: wheels
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create and push version tag
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          TAG="v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
