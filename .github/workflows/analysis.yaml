name: Analysis

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  coverage_report:
    name: Coverage report on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ ubuntu-24.04 ]

    env:
      BUILD_WITH_CUDA: 0
      MINIMAL_MODULE_BUILD: 1
      SKIP_STUBGEN: 1
      SKIP_BACK_COPY: 1
      ENABLE_COVERAGE: 1

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install numpy tqdm pytest pytest-cov gcovr

      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Debug

      - name: Build module
        run: cmake --build build -j $(nproc)

      - name: Install module
        run: cmake --install build

      - name: Run C++ test suite
        run: |
          cd test
          ../build/mpcf_test || true

      - name: Run Python test suite
        run: |
          mkdir -p covreport/python
          cd test
          python -m pytest . \
            --cov=masspcf \
            --cov-config=../pyproject.toml \
            --cov-report=html:../covreport/python \
            --cov-report=json:../covreport/python/coverage.json \
            --cov-report=term
          touch ../covreport/python/.keep
          if [ ! -f "../covreport/python/index.html" ]; then
            python -m coverage html --directory=../covreport/python || true
          fi
          if [ ! -f "../covreport/python/coverage.json" ]; then
            python -m coverage json -o ../covreport/python/coverage.json || true
          fi
          touch ../covreport/python/.keep

      - name: Create C++ coverage report
        run: |
          mkdir -p covreport/cpp
          cd covreport/cpp
          gcovr --gcov-ignore-parse-errors=negative_hits.warn_once_per_file \
            -r . --object-directory ../../build \
            --filter ../../include/ --filter ../../src/ \
            --html-details coverage.html \
            --json-summary coverage-summary.json \
            --print-summary
          gcovr --gcov-ignore-parse-errors=negative_hits.warn_once_per_file \
            -r . --object-directory ../../build \
            --filter ../../include/ --filter ../../src/ \
            --markdown >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: covreport/
          retention-days: 1

  memory_check:
    name: Memory check on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ ubuntu-24.04 ]

    env:
      BUILD_WITH_CUDA: 0
      MINIMAL_MODULE_BUILD: 1
      SKIP_STUBGEN: 1
      SKIP_BACK_COPY: 1
      PYTHONMALLOC: malloc

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install numpy tqdm pytest ValgrindCI

      - name: Install Valgrind and Debug Symbols
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind libc6-dbg

      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Debug

      - name: Build module
        run: cmake --build build -j $(nproc)

      - name: Install module
        run: cmake --install build

      - name: Create reports directory
        run: mkdir test/reports

      - name: Run valgrind on Pytest
        run: |
          cd test
          valgrind --xml=yes --xml-file=./reports/vg-pytest.xml \
            --log-file=./reports/vg-pytest.log \
            python -m pytest . -vv -s || true
          valgrind-ci ./reports/vg-pytest.xml --summary | tee ./reports/vg-pytest-summary.txt >> $GITHUB_STEP_SUMMARY
          valgrind-ci ./reports/vg-pytest.xml --output-dir=./reports/vg_pytest

      - name: Run valgrind on GTest
        run: |
          cd test
          valgrind --xml=yes --xml-file=./reports/vg-gtest.xml \
            --log-file=./reports/vg-gtest.log \
            ../build/mpcf_test || true
          valgrind-ci ./reports/vg-gtest.xml --summary | tee ./reports/vg-gtest-summary.txt >> $GITHUB_STEP_SUMMARY
          valgrind-ci ./reports/vg-gtest.xml --output-dir=./reports/vg_gtest

      - name: Run helgrind on Pytest
        run: |
          cd test
          valgrind --tool=helgrind --xml=yes --xml-file=./reports/hg-pytest.xml \
            --log-file=./reports/hg-pytest.log \
            python -m pytest . -vv -s || true
          valgrind-ci ./reports/hg-pytest.xml --summary | tee ./reports/hg-pytest-summary.txt >> $GITHUB_STEP_SUMMARY
          valgrind-ci ./reports/hg-pytest.xml --output-dir=./reports/hg_pytest

      - name: Run helgrind on GTest
        run: |
          cd test
          valgrind --tool=helgrind --xml=yes --xml-file=./reports/hg-gtest.xml \
            --log-file=./reports/hg-gtest.log \
            ../build/mpcf_test || true
          valgrind-ci ./reports/hg-gtest.xml --summary | tee ./reports/hg-gtest-summary.txt >> $GITHUB_STEP_SUMMARY
          valgrind-ci ./reports/hg-gtest.xml --output-dir=./reports/hg_gtest

      - name: Collect raw reports
        run: |
          cp test/reports/vg-pytest.xml        test/reports/vg_pytest/raw.xml      || true
          cp test/reports/vg-pytest.log        test/reports/vg_pytest/raw.log      || true
          cp test/reports/vg-pytest-summary.txt test/reports/vg_pytest/summary.txt || true
          cp test/reports/vg-gtest.xml         test/reports/vg_gtest/raw.xml       || true
          cp test/reports/vg-gtest.log         test/reports/vg_gtest/raw.log       || true
          cp test/reports/vg-gtest-summary.txt  test/reports/vg_gtest/summary.txt  || true
          cp test/reports/hg-pytest.xml        test/reports/hg_pytest/raw.xml      || true
          cp test/reports/hg-pytest.log        test/reports/hg_pytest/raw.log      || true
          cp test/reports/hg-pytest-summary.txt test/reports/hg_pytest/summary.txt || true
          cp test/reports/hg-gtest.xml         test/reports/hg_gtest/raw.xml       || true
          cp test/reports/hg-gtest.log         test/reports/hg_gtest/raw.log       || true
          cp test/reports/hg-gtest-summary.txt  test/reports/hg_gtest/summary.txt  || true

      - name: Upload valgrind artifact
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-output
          path: test/reports/
          retention-days: 1

  publish:
    name: Publish reports to GitHub Pages
    runs-on: ubuntu-24.04
    needs: [coverage_report, memory_check]

    steps:
      - uses: actions/checkout@v6

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: covreport/

      - name: Download valgrind artifact
        uses: actions/download-artifact@v4
        with:
          name: valgrind-output
          path: valgrind/

      - name: Checkout gh-pages branch
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages-branch
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update report history and generate index
        run: |
          # Fetch tags only (avoids noisy branch output)
          git fetch --tags --no-recurse-submodules
          TAG_MAP=$(git tag --list | while read tag; do
            sha=$(git rev-list -n1 "$tag" 2>/dev/null | cut -c1-7)
            [ -n "$sha" ] && echo "${sha}=${tag}"
          done | tr '\n' ' ')

          TIMESTAMP=$(date -u '+%Y-%m-%d_%H-%M-%S')
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          REPORT_DIR="reports/${TIMESTAMP}_${SHORT_SHA}"

          mkdir -p "gh-pages-branch/${REPORT_DIR}/cpp"
          mkdir -p "gh-pages-branch/${REPORT_DIR}/python"
          mkdir -p "gh-pages-branch/${REPORT_DIR}/valgrind/vg_pytest"
          mkdir -p "gh-pages-branch/${REPORT_DIR}/valgrind/vg_gtest"
          mkdir -p "gh-pages-branch/${REPORT_DIR}/helgrind/hg_pytest"
          mkdir -p "gh-pages-branch/${REPORT_DIR}/helgrind/hg_gtest"

          # Copy artifacts — guard each with || true so a missing subdirectory
          # (e.g. if a tool produced no output) doesn't abort the whole step
          [ -d covreport/cpp ]           && cp -r covreport/cpp/.           "gh-pages-branch/${REPORT_DIR}/cpp/"           || true
          [ -d covreport/python ]        && { rm -f covreport/python/.gitignore; cp -r covreport/python/. "gh-pages-branch/${REPORT_DIR}/python/"; } || true
          [ -d valgrind/vg_pytest ]      && cp -r valgrind/vg_pytest/.      "gh-pages-branch/${REPORT_DIR}/valgrind/vg_pytest/" || true
          [ -d valgrind/vg_gtest ]       && cp -r valgrind/vg_gtest/.       "gh-pages-branch/${REPORT_DIR}/valgrind/vg_gtest/"  || true
          [ -d valgrind/hg_pytest ]      && cp -r valgrind/hg_pytest/.      "gh-pages-branch/${REPORT_DIR}/helgrind/hg_pytest/" || true
          [ -d valgrind/hg_gtest ]       && cp -r valgrind/hg_gtest/.       "gh-pages-branch/${REPORT_DIR}/helgrind/hg_gtest/"  || true

          echo "${{ github.ref_name }}" > "gh-pages-branch/${REPORT_DIR}/branch"

          python3 .github/scripts/generate_coverage_index.py gh-pages-branch --tag-map $TAG_MAP

      - name: Write coverage badge JSONs
        run: python3 .github/scripts/generate_badges.py gh-pages-branch covreport

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages-branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "reports: add run for ${{ github.sha }}"
          git push
