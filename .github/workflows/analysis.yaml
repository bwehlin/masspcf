name: Analysis
on:
  workflow_dispatch:
  workflow_call:
permissions:
  contents: write

jobs:
  coverage_report:
    name: Coverage report on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-24.04 ]
    env:
      BUILD_WITH_CUDA: 0
      MINIMAL_MODULE_BUILD: 1
      SKIP_STUBGEN: 1
      SKIP_BACK_COPY: 1
      ENABLE_COVERAGE: 1
      LLVM_VERSION: 21
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install numpy tqdm pytest pytest-cov

      - name: Install LLVM toolchain (clang/llvm-cov/llvm-profdata)
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh $LLVM_VERSION
          sudo update-alternatives --install /usr/bin/llvm-cov llvm-cov /usr/bin/llvm-cov-$LLVM_VERSION 100
          sudo update-alternatives --install /usr/bin/llvm-profdata llvm-profdata /usr/bin/llvm-profdata-$LLVM_VERSION 100
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-$LLVM_VERSION 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-$LLVM_VERSION 100

          # Verify:
          clang --version
          llvm-cov --version
          llvm-profdata --version


      - name: Configure CMake (Clang + coverage)
        env:
          ENABLE_COVERAGE: 1
          CC: clang-${{ env.LLVM_VERSION }}
          CXX: clang++-${{ env.LLVM_VERSION }}
        run: |
          cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Debug

      - name: Build module
        run: cmake --build build -j $(nproc)

      - name: Install module
        run: cmake --install build

      - name: Run C++ test suite (collect LLVM profiles)
        env:
          LLVM_PROFILE_FILE: ${{ github.workspace }}/covreport/profiles/%p-%m.profraw
        run: |
          mkdir -p covreport/profiles
          cd test
          ../build/mpcf_test || true

      - name: Run Python test suite (coverage + LLVM profiles)
        env:
          LLVM_PROFILE_FILE: ${{ github.workspace }}/covreport/profiles/%p-%m.profraw
        run: |
          mkdir -p covreport/python
          cd test
          python -m pytest . \
            --cov=masspcf \
            --cov-config=../pyproject.toml \
            --cov-report=html:../covreport/python \
            --cov-report=json:../covreport/python/coverage.json \
            --cov-report=term
          touch ../covreport/python/.keep
          if [ ! -f "../covreport/python/index.html" ]; then
            python -m coverage html --directory=../covreport/python || true
          fi
          if [ ! -f "../covreport/python/coverage.json" ]; then
            python -m coverage json -o ../covreport/python/coverage.json || true
          fi
          touch ../covreport/python/.keep

      - name: Create C++ coverage report (LLVM)
        run: |
          mkdir -p covreport/cpp
          # Merge all .profraw into a single .profdata
          llvm-profdata merge -sparse -o covreport/cpp/default.profdata covreport/profiles/*.profraw
          # Discover the test exe + Python extension module built by CMake
          FIRST_OBJ="$(find build -type f \( -name 'mpcf_test' -o -name '_mpcf*.so' \) | head -1)"
          EXTRA_OBJS="$(find build -type f \( -name 'mpcf_test' -o -name '_mpcf*.so' \) | tail -n +2 | sed 's/^/-object /' | tr '\n' ' ')"
          echo "Objects for llvm-cov: $FIRST_OBJ $EXTRA_OBJS"
          INSTR_PROFILE="-instr-profile=covreport/cpp/default.profdata"
          IGNORE="-ignore-filename-regex=(3rd/|/usr/include/|.*/site-packages/|.*/pybind11/|test/)"
          # Generate compact HTML report (line counts only)
          mkdir -p covreport/cpp/detailed
          llvm-cov show $FIRST_OBJ $EXTRA_OBJS \
            $INSTR_PROFILE $IGNORE \
            -format=html -output-dir=covreport/cpp \
            -show-line-counts-or-regions -show-instantiations=false
          # Generate detailed HTML report (branches + expansions) in a subdirectory
          llvm-cov show $FIRST_OBJ $EXTRA_OBJS \
            $INSTR_PROFILE $IGNORE \
            -format=html -output-dir=covreport/cpp/detailed \
            -show-line-counts-or-regions -show-branches=count \
            -show-instantiations -show-expansions --Xdemangler c++filt
          # Preserve downstream expectation of 'coverage.html'
          cp covreport/cpp/index.html covreport/cpp/coverage.html || true
          # Export JSON summary -> synthesize expected coverage-summary.json (line_percent)
          llvm-cov export $FIRST_OBJ $EXTRA_OBJS \
              $INSTR_PROFILE $IGNORE \
              -summary-only \
              > covreport/cpp/llvm-cov-summary.json
          python3 .github/scripts/llvm_cov_summary.py \
              covreport/cpp/llvm-cov-summary.json covreport/cpp/coverage-summary.json
          # Human-readable table in the step summary
          llvm-cov report $FIRST_OBJ $EXTRA_OBJS $INSTR_PROFILE $IGNORE >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: covreport/
          retention-days: 1

  memory_check:
    name: Memory check on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-24.04 ]
    env:
      BUILD_WITH_CUDA: 0
      MINIMAL_MODULE_BUILD: 1
      SKIP_STUBGEN: 1
      SKIP_BACK_COPY: 1
      PYTHONMALLOC: malloc
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install numpy tqdm pytest ValgrindCI

      - name: Install Valgrind and Debug Symbols
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind libc6-dbg

      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Debug

      - name: Build module
        run: cmake --build build -j $(nproc)

      - name: Install module
        run: cmake --install build

      - name: Create reports directory
        run: mkdir test/reports

      - name: Run valgrind on Pytest
        run: |
          cd test
          valgrind --xml=yes --xml-file=./reports/vg-pytest.xml \
            --log-file=./reports/vg-pytest.log \
            --suppressions=${{github.workspace}}/test/vg_py.supp \
            --suppressions=${{github.workspace}}/3rd/pybind11/tests/valgrind-python.supp \
            --suppressions=${{github.workspace}}/3rd/pybind11/tests/valgrind-numpy-scipy.supp \
            python -m pytest . -vv -s || true
          valgrind-ci ./reports/vg-pytest.xml --summary | tee ./reports/vg-pytest-summary.txt >> $GITHUB_STEP_SUMMARY
          valgrind-ci ./reports/vg-pytest.xml --output-dir=./reports/vg_pytest

      - name: Run valgrind on GTest
        run: |
          cd test
          valgrind --xml=yes --xml-file=./reports/vg-gtest.xml \
            --log-file=./reports/vg-gtest.log \
            --suppressions=${{github.workspace}}/test/vg_py.supp \
            --suppressions=${{github.workspace}}/3rd/pybind11/tests/valgrind-python.supp \
            --suppressions=${{github.workspace}}/3rd/pybind11/tests/valgrind-numpy-scipy.supp \
            ../build/mpcf_test || true
          valgrind-ci ./reports/vg-gtest.xml --summary | tee ./reports/vg-gtest-summary.txt >> $GITHUB_STEP_SUMMARY
          valgrind-ci ./reports/vg-gtest.xml --output-dir=./reports/vg_gtest

      - name: Run helgrind on Pytest
        run: |
          cd test
          valgrind --tool=helgrind --xml=yes --xml-file=./reports/hg-pytest.xml \
            --log-file=./reports/hg-pytest.log \
            python -m pytest . -vv -s || true
          valgrind-ci ./reports/hg-pytest.xml --summary | tee ./reports/hg-pytest-summary.txt >> $GITHUB_STEP_SUMMARY
          valgrind-ci ./reports/hg-pytest.xml --output-dir=./reports/hg_pytest

      - name: Run helgrind on GTest
        run: |
          cd test
          valgrind --tool=helgrind --xml=yes --xml-file=./reports/hg-gtest.xml \
            --log-file=./reports/hg-gtest.log \
            ../build/mpcf_test || true
          valgrind-ci ./reports/hg-gtest.xml --summary | tee ./reports/hg-gtest-summary.txt >> $GITHUB_STEP_SUMMARY
          valgrind-ci ./reports/hg-gtest.xml --output-dir=./reports/hg_gtest

      - name: Collect raw reports
        run: |
          cp test/reports/vg-pytest.xml test/reports/vg_pytest/raw.xml || true
          cp test/reports/vg-pytest.log test/reports/vg_pytest/raw.log || true
          cp test/reports/vg-pytest-summary.txt test/reports/vg_pytest/summary.txt || true
          cp test/reports/vg-gtest.xml test/reports/vg_gtest/raw.xml || true
          cp test/reports/vg-gtest.log test/reports/vg_gtest/raw.log || true
          cp test/reports/vg-gtest-summary.txt test/reports/vg_gtest/summary.txt || true
          cp test/reports/hg-pytest.xml test/reports/hg_pytest/raw.xml || true
          cp test/reports/hg-pytest.log test/reports/hg_pytest/raw.log || true
          cp test/reports/hg-pytest-summary.txt test/reports/hg_pytest/summary.txt || true
          cp test/reports/hg-gtest.xml test/reports/hg_gtest/raw.xml || true
          cp test/reports/hg-gtest.log test/reports/hg_gtest/raw.log || true
          cp test/reports/hg-gtest-summary.txt test/reports/hg_gtest/summary.txt || true

      - name: Upload valgrind artifact
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-output
          path: test/reports/
          retention-days: 1

  publish:
    name: Publish reports to GitHub Pages
    runs-on: ubuntu-24.04
    needs: [coverage_report, memory_check]
    steps:
      - uses: actions/checkout@v6

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: covreport/

      - name: Download valgrind artifact
        uses: actions/download-artifact@v4
        with:
          name: valgrind-output
          path: valgrind/

      - name: Checkout gh-pages branch
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages-branch
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update report history and generate index
        run: |
          # Fetch tags only (avoids noisy branch output)
          git fetch --tags --no-recurse-submodules
          TAG_MAP=$(git tag --list | while read tag; do
            sha=$(git rev-list -n1 "$tag" 2>/dev/null | cut -c1-7)
            [ -n "$sha" ] && echo "${sha}=${tag}"
          done | tr '\n' ' ')
          TIMESTAMP=$(date -u '+%Y-%m-%d_%H-%M-%S')
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          REPORT_DIR="reports/${TIMESTAMP}_${SHORT_SHA}"
          mkdir -p "gh-pages-branch/${REPORT_DIR}/cpp"
          mkdir -p "gh-pages-branch/${REPORT_DIR}/python"
          mkdir -p "gh-pages-branch/${REPORT_DIR}/valgrind/vg_pytest"
          mkdir -p "gh-pages-branch/${REPORT_DIR}/valgrind/vg_gtest"
          mkdir -p "gh-pages-branch/${REPORT_DIR}/helgrind/hg_pytest"
          mkdir -p "gh-pages-branch/${REPORT_DIR}/helgrind/hg_gtest"

          [ -d covreport/cpp ] && cp -r covreport/cpp/. "gh-pages-branch/${REPORT_DIR}/cpp/" || true
          [ -d covreport/python ] && { rm -f covreport/python/.gitignore; cp -r covreport/python/. "gh-pages-branch/${REPORT_DIR}/python/"; } || true
          [ -d valgrind/vg_pytest ] && cp -r valgrind/vg_pytest/. "gh-pages-branch/${REPORT_DIR}/valgrind/vg_pytest/" || true
          [ -d valgrind/vg_gtest ] && cp -r valgrind/vg_gtest/. "gh-pages-branch/${REPORT_DIR}/valgrind/vg_gtest/" || true
          [ -d valgrind/hg_pytest ] && cp -r valgrind/hg_pytest/. "gh-pages-branch/${REPORT_DIR}/helgrind/hg_pytest/" || true
          [ -d valgrind/hg_gtest ] && cp -r valgrind/hg_gtest/. "gh-pages-branch/${REPORT_DIR}/helgrind/hg_gtest/" || true

          echo "${{ github.ref_name }}" > "gh-pages-branch/${REPORT_DIR}/branch"
          python3 .github/scripts/generate_coverage_index.py gh-pages-branch --tag-map $TAG_MAP

      - name: Write coverage badge JSONs
        run: python3 .github/scripts/generate_badges.py gh-pages-branch covreport

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages-branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "reports: add run for ${{ github.sha }}"
          git push

      - name: Wait for GitHub Pages deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Capture the current latest deployment ID before our push is processed
          PREV_ID=$(gh api "repos/${{ github.repository }}/deployments?environment=github-pages&per_page=1" \
            --jq '.[0].id' 2>/dev/null || echo "null")
          echo "Previous deployment ID: $PREV_ID"

          # Wait for a new deployment to appear
          echo "Waiting for new Pages deployment to be created..."
          DEPLOY_ID="null"
          for i in $(seq 1 24); do
            DEPLOY_ID=$(gh api "repos/${{ github.repository }}/deployments?environment=github-pages&per_page=1" \
              --jq '.[0].id' 2>/dev/null || echo "null")
            if [ "$DEPLOY_ID" != "null" ] && [ "$DEPLOY_ID" != "$PREV_ID" ]; then
              echo "New deployment detected: $DEPLOY_ID"
              break
            fi
            echo "  [$i/24] waiting for new deployment..."
            sleep 5
          done

          if [ "$DEPLOY_ID" = "null" ] || [ "$DEPLOY_ID" = "$PREV_ID" ]; then
            echo "No new Pages deployment appeared, skipping."
            exit 0
          fi

          # Poll until the deployment succeeds
          echo "Polling deployment $DEPLOY_ID..."
          for i in $(seq 1 36); do
            STATUS=$(gh api "repos/${{ github.repository }}/deployments/$DEPLOY_ID/statuses?per_page=1" \
              --jq '.[0].state' 2>/dev/null || echo "unknown")
            echo "  [$i/36] $STATUS"
            case "$STATUS" in
              success)
                echo "GitHub Pages deployed: https://${{ github.repository_owner }}.github.io/$(basename ${{ github.repository }})/"
                break ;;
              error|failure)
                echo "Pages deployment failed: $STATUS"
                exit 1 ;;
            esac
            sleep 5
          done
