name: BuildWheels

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            cuda: 1
          - os: ubuntu-22.04-arm
            cuda: 0
          - os: macos-26
            cuda: 0
          - os: windows-2025
            cuda: 1

    steps:

      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'


      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set build parallelism
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            CORES=$NUMBER_OF_PROCESSORS
          else
            CORES=$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)
          fi
          echo "CMAKE_BUILD_PARALLEL_LEVEL=$CORES" >> $GITHUB_ENV
          echo "Using $CORES core(s) to build..."


      - name: Install CUDA NVCC (Windows)
        if: runner.os == 'Windows' && matrix.cuda == 1
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install "cuda-toolkit[nvcc]"

      - name: Activate MSVC & export CUDA_PATH/PATH (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          REM --- Find latest MSVC install that has the C++ tools ---
          for /f "usebackq delims=" %%i in (`
            "%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" ^
              -latest -products * ^
              -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 ^
              -property installationPath
          `) do set VSPATH=%%i

          if not defined VSPATH (
            echo MSVC Build Tools not found
            exit /b 1
          )

          REM --- Initialize MSVC environment (x64) ---
          call "%VSPATH%\VC\Auxiliary\Build\vcvarsall.bat" x64

          REM --- Discover PyPI-installed CUDA paths (nvidia-cuda-nvcc) ---
          for /f "usebackq delims=" %%p in (`
            python -c "import os,importlib,sys; m=importlib.import_module('nvidia_cuda_nvcc'); sys.stdout.write(os.path.dirname(m.__file__))"
          `) do set CUDA_PATH=%%p

          for /f "usebackq delims=" %%p in (`
            python -c "import os,importlib,sys; m=importlib.import_module('nvidia_cuda_nvcc'); sys.stdout.write(os.path.join(os.path.dirname(m.__file__),'bin'))"
          `) do set NVCC_BIN=%%p

          REM --- Make nvcc available immediately in this step ---
          set PATH=%NVCC_BIN%;%PATH%

          REM --- Persist for subsequent steps (GitHub Actions) ---
          echo %NVCC_BIN%>> "%GITHUB_PATH%"
          echo CUDA_PATH=%CUDA_PATH%>> "%GITHUB_ENV%"

          REM --- Sanity checks ---
          where cl
          where nvcc || (echo nvcc was not placed on PATH & exit /b 1)
          nvcc --version

      - name: Locate MSVC and prime environment (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          :: Find latest VS/MSVC that has C++ tools
          for /f "usebackq delims=" %%i in (`
            "%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" ^
              -latest -products * ^
              -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 ^
              -property installationPath
          `) do set VSPATH=%%i
          
          if not defined VSPATH (
            echo "MSVC Build Tools not found"; exit /b 1
          )
          
          :: Export a temporary .cmd we can call inside cibuildwheel hooks if needed
          echo call "%VSPATH%\VC\Auxiliary\Build\vcvarsall.bat" x64 > %GITHUB_WORKSPACE%\_msvc_env.cmd
          
          :: Prove toolchain is ready
          call "%VSPATH%\VC\Auxiliary\Build\vcvarsall.bat" x64
          where cl
          where nvcc
          nvcc --version

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        env:
          CIBW_BUILD_VERBOSITY: 1
          CIBW_BUILD_FRONTEND: "build[uv]"
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
          CIBW_SKIP: "*-musllinux*"
          CIBW_BEFORE_ALL_LINUX: >-
            bash -c '
            [ "$(uname -m)" != "x86_64" ] && exit 0;
            [ -f /lib/ld-musl-x86_64.so.1 ] && exit 0;
            curl -o /etc/yum.repos.d/cuda.repo
            https://developer.download.nvidia.com/compute/cuda/repos/rhel8/x86_64/cuda-rhel8.repo &&
            dnf install -y --nogpgcheck cuda-nvcc-12-8 cuda-cudart-devel-12-8'
          CIBW_ENVIRONMENT_LINUX: >-
            BUILD_WITH_CUDA=${{ matrix.cuda }}
            PATH=/usr/local/cuda/bin:$PATH
            CUDAToolkit_ROOT=/usr/local/cuda
            CMAKE_BUILD_PARALLEL_LEVEL=$CMAKE_BUILD_PARALLEL_LEVEL
            CMAKE_UNITY_BUILD=ON
            CMAKE_UNITY_BUILD_BATCH_SIZE=4
          CIBW_ENVIRONMENT_MACOS: >-
            BUILD_WITH_CUDA=${{ matrix.cuda }}
            MACOSX_DEPLOYMENT_TARGET=11.0
            CMAKE_BUILD_PARALLEL_LEVEL=$CMAKE_BUILD_PARALLEL_LEVEL
            CMAKE_UNITY_BUILD=ON
            CMAKE_UNITY_BUILD_BATCH_SIZE=4
          CIBW_ENVIRONMENT_WINDOWS: >-
            BUILD_WITH_CUDA=${{ matrix.cuda }}
            CMAKE_BUILD_PARALLEL_LEVEL=$CMAKE_BUILD_PARALLEL_LEVEL
            CMAKE_UNITY_BUILD=ON
            CMAKE_UNITY_BUILD_BATCH_SIZE=4
            CMAKE_ARGS=${{ matrix.cuda == 1 && '-DCUDAToolkit_ROOT=%CUDA_PATH% -DCMAKE_CUDA_COMPILER=%CUDA_PATH%/bin/nvcc.exe' || '' }}

      - name: Save CUDA toolkit cache (Windows)
        if: always() && runner.os == 'Windows' && steps.cache-cuda.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.8
          key: cuda-12.8.0-windows-nvcc-cudart-vsint

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 1

  merge_artifacts:
    runs-on: ubuntu-latest
    needs: build_wheels
    steps:
      - name: Merge Artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: wheels
          pattern: "wheels-*"
          retention-days: 2
