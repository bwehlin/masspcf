name: BuildWheels

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            cuda: 1
          - os: ubuntu-22.04-arm
            cuda: 0
          - os: macos-26
            cuda: 0
          - os: windows-2025
            cuda: 0

    steps:

      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'


      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set build parallelism
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            CORES=$NUMBER_OF_PROCESSORS
          else
            CORES=$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)
          fi
          echo "CMAKE_BUILD_PARALLEL_LEVEL=$CORES" >> $GITHUB_ENV
          echo "Using $CORES core(s) to build..."

      # Use the same Python everywhere (recommended)
      - name: Setup Python
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Install NVIDIA's NVCC via PyPI (fast; no 10‑min CUDA installer)
      - name: Install CUDA NVCC (Windows)
        if: runner.os == 'Windows' && matrix.cuda == 1
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install cuda-toolkit[nvcc]

      # Find nvcc.exe under site-packages/nvidia/** and emit helper files
      - name: Resolve nvcc & CUDA paths (Windows)
        if: runner.os == 'Windows' && matrix.cuda == 1
        shell: bash
        run: |
          python - <<'PY'
          import os, site, sys
          paths = set(site.getsitepackages() + [site.getusersitepackages()])
          nvcc = None
          for p in paths:
              base = os.path.join(p, 'nvidia')
              if not os.path.isdir(base):
                  continue
              for root, _, files in os.walk(base):
                  if 'nvcc.exe' in files:
                      nvcc = os.path.join(root, 'nvcc.exe')
                      break
              if nvcc:
                  break
          if not nvcc:
              print("nvcc.exe not found under any site-packages/nvidia/**", file=sys.stderr)
              sys.exit(1)
          nvcc_bin = os.path.dirname(nvcc).replace('\\', '/')
          cuda_path = os.path.dirname(nvcc_bin)
          with open('nvcc_bin.txt', 'w', encoding='utf-8') as f:
              f.write(nvcc_bin)
          with open('cuda_path.txt', 'w', encoding='utf-8') as f:
              f.write(cuda_path)
          PY

      # Activate MSVC for any VS version; export PATH and CUDA_PATH
      - name: Activate MSVC & export CUDA_PATH/PATH (Windows)
        if: runner.os == 'Windows' && matrix.cuda == 1
        shell: cmd
        run: |
          setlocal EnableExtensions EnableDelayedExpansion

          REM Locate the newest Visual Studio with C++ tools
          for /f "usebackq delims=" %%i in (`
            "%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" ^
              -latest -products * ^
              -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 ^
              -property installationPath
          `) do set "VSPATH=%%i"

          if not defined VSPATH (
            echo MSVC Build Tools not found
            exit /b 1
          )

          REM Initialize MSVC environment (x64) for this shell
          call "%VSPATH%\VC\Auxiliary\Build\vcvarsall.bat" x64

          REM Read helper files produced by the previous step
          set /p NVCC_BIN=<nvcc_bin.txt
          set /p CUDA_PATH=<cuda_path.txt

          if not exist "%NVCC_BIN%\nvcc.exe" (
            echo nvcc.exe not found at "%NVCC_BIN%\nvcc.exe"
            exit /b 1
          )

          REM Make nvcc + cl.exe available for subsequent steps (Ninja needs them on PATH)
          set "PATH=%NVCC_BIN%;%PATH%"
          echo %NVCC_BIN%>> "%GITHUB_PATH%"
          echo CUDA_PATH=%CUDA_PATH%>> "%GITHUB_ENV%"

          REM Export all MSVC / Windows SDK directories so Ninja can find
          REM cl.exe, link.exe, rc.exe, mt.exe, etc.
          python -c "import os; f=open(os.environ['GITHUB_PATH'],'a'); [f.write(p+chr(10)) for p in os.environ['PATH'].split(';') if 'MSVC' in p or 'Windows Kits' in p]"

          REM Export INCLUDE / LIB so cl.exe can find headers and libraries
          echo INCLUDE=%INCLUDE%>> "%GITHUB_ENV%"
          echo LIB=%LIB%>> "%GITHUB_ENV%"

          REM Sanity checks
          where cl
          where nvcc
          nvcc --version

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        env:
          CIBW_BUILD_VERBOSITY: 1
          CIBW_BUILD_FRONTEND: "build[uv]"
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
          CIBW_BEFORE_ALL_LINUX: >-
            bash -c '
            [ "$(uname -m)" != "x86_64" ] && exit 0;
            [ -f /lib/ld-musl-x86_64.so.1 ] && exit 0;
            curl -o /etc/yum.repos.d/cuda.repo
            https://developer.download.nvidia.com/compute/cuda/repos/rhel8/x86_64/cuda-rhel8.repo &&
            dnf install -y --nogpgcheck cuda-nvcc-12-8 cuda-cudart-devel-12-8'
          CIBW_ENVIRONMENT_LINUX: >-
            BUILD_WITH_CUDA=${{ matrix.cuda }}
            PATH=/usr/local/cuda/bin:$PATH
            CUDAToolkit_ROOT=/usr/local/cuda
            CMAKE_BUILD_PARALLEL_LEVEL=$CMAKE_BUILD_PARALLEL_LEVEL
            CMAKE_UNITY_BUILD=ON
            CMAKE_UNITY_BUILD_BATCH_SIZE=4
          CIBW_ENVIRONMENT_MACOS: >-
            BUILD_WITH_CUDA=${{ matrix.cuda }}
            MACOSX_DEPLOYMENT_TARGET=11.0
            CMAKE_BUILD_PARALLEL_LEVEL=$CMAKE_BUILD_PARALLEL_LEVEL
            CMAKE_UNITY_BUILD=ON
            CMAKE_UNITY_BUILD_BATCH_SIZE=4
          CIBW_ENVIRONMENT_WINDOWS: >-
            BUILD_WITH_CUDA=${{ matrix.cuda }}
            CMAKE_BUILD_PARALLEL_LEVEL=$CMAKE_BUILD_PARALLEL_LEVEL
            CMAKE_UNITY_BUILD=ON
            CMAKE_UNITY_BUILD_BATCH_SIZE=4
            CMAKE_ARGS=${{ matrix.cuda == 1 && '"-G Ninja -DCUDAToolkit_ROOT=${CUDA_PATH} -DCMAKE_CUDA_COMPILER=${CUDA_PATH}/bin/nvcc.exe"' || '' }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 1

  merge_artifacts:
    runs-on: ubuntu-latest
    needs: build_wheels
    steps:
      - name: Merge Artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: wheels
          pattern: "wheels-*"
          retention-days: 2
