name: BuildWheels

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            cuda: 1
          - os: ubuntu-22.04-arm
            cuda: 0
          - os: macos-26
            cuda: 0
          - os: windows-2025
            cuda: 1

    steps:

      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'


      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set build parallelism
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            CORES=$NUMBER_OF_PROCESSORS
          else
            CORES=$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)
          fi
          echo "CMAKE_BUILD_PARALLEL_LEVEL=$CORES" >> $GITHUB_ENV
          echo "Using $CORES core(s) to build..."

      - name: Restore CUDA toolkit cache (Windows)
        if: runner.os == 'Windows'
        id: cache-cuda
        uses: actions/cache/restore@v4
        with:
          path: C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.8
          key: cuda-12.8.0-windows-nvcc-cudart-vsint

      - name: Install CUDA toolkit (Windows)
        if: runner.os == 'Windows' && steps.cache-cuda.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://developer.download.nvidia.com/compute/cuda/12.8.0/network_installers/cuda_12.8.0_windows_network.exe" -OutFile cuda_setup.exe
          Start-Process -Wait -FilePath .\cuda_setup.exe -ArgumentList "-s nvcc_12.8 cudart_12.8 visual_studio_integration_12.8"


      - name: Repair CUDA VS integration (Windows, cache hit)
        if: runner.os == 'Windows' && matrix.cuda == 1 && steps.cache-cuda.outputs.cache-hit == 'true'
        shell: pwsh
        run: |
          $cudaRoot = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.8"
          $vsIntegration = Join-Path $cudaRoot "extras\visual_studio_integration\CudaPostInstallVSIntegration.exe"
          if (Test-Path $vsIntegration) {
              & $vsIntegration /silent
              Write-Host "Repaired CUDA Visual Studio Integration."
          } else {
              Write-Host "VS Integration helper missing — falling back to tiny installer."
              Invoke-WebRequest -Uri "https://developer.download.nvidia.com/compute/cuda/12.8.0/network_installers/cuda_12.8.0_windows_network.exe" -OutFile cuda_setup.exe
              Start-Process -Wait -FilePath .\cuda_setup.exe -ArgumentList "-s visual_studio_integration_12.8"
          }

      - name: Add CUDA to PATH (Windows)
        if: runner.os == 'Windows' && matrix.cuda == 1
        shell: pwsh
        run: |
          $cudaRoot = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.8"
          Add-Content $env:GITHUB_PATH "$cudaRoot\bin"
          Add-Content $env:GITHUB_ENV "CUDA_PATH=$cudaRoot"
          Add-Content $env:GITHUB_ENV "CUDA_PATH_V12_8=$cudaRoot"


      - name: Verify CUDA & MSVC (Windows)
        if: runner.os == 'Windows' && matrix.cuda == 1
        shell: pwsh
        run: |
          nvcc --version

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        env:
          CIBW_BUILD_VERBOSITY: 1
          CIBW_BUILD_FRONTEND: "build[uv]"
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
          CIBW_SKIP: "*-musllinux*"

          # ... keep your existing CIBW_ENVIRONMENT_* blocks ...

          # Windows-only: before each build, compute and export exact Python locations to CMake
          CIBW_BEFORE_BUILD_WINDOWS: |
            $code = @'
            import json, sys, sysconfig, os
            bp = sys.base_prefix
            inc = os.path.join(bp, "include")
            libname = sysconfig.get_config_var("LIBRARY")  # e.g., python311.lib (may be None)
            cands = []
            if libname:
              cands.append(os.path.join(bp, "libs", libname))
              v = f"python{sys.version_info[0]}{sys.version_info[1]}"
              cands += [os.path.join(bp, "libs", v + ".lib"), os.path.join(bp, "libs", v + "_d.lib")]
              lib = next((c for c in cands if os.path.exists(c)), "")
            print(json.dumps({"exe": sys.executable, "bp": bp, "inc": inc, "lib": lib, "cands": cands}))
              '@
                  $info = python -c $code | ConvertFrom-Json
            
                  if (-not $info.lib) {
                    Write-Host "Candidate import libraries:"
                    $info.cands | ForEach-Object { Write-Host "  - $_" }
                    throw "Could not locate Python import library (.lib) under $($info.bp)\libs"
                  }
            
                  # Tell CMake/FindPython exactly what to use
                  $args = @(
                    '-DPython3_FIND_STRATEGY=LOCATION',
              '-DPython3_FIND_REGISTRY=NEVER',
              "-DPython3_EXECUTABLE=$($info.exe)",
              "-DPython3_LIBRARY=$($info.lib)",
              "-DPython3_INCLUDE_DIR=$($info.inc)"
              ) -join ' '
              
              if ($env:CMAKE_ARGS) {
              $env:CMAKE_ARGS = "$env:CMAKE_ARGS $args"
            } else {
              $env:CMAKE_ARGS = $args
            }
              
              Write-Host "CMAKE_ARGS -> $env:CMAKE_ARGS"
      

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        env:
          CIBW_BUILD_VERBOSITY: 1
          CIBW_BUILD_FRONTEND: "build[uv]"
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
          CIBW_SKIP: "*-musllinux*"
          CIBW_BEFORE_ALL_LINUX: >-
            bash -c '
            [ "$(uname -m)" != "x86_64" ] && exit 0;
            [ -f /lib/ld-musl-x86_64.so.1 ] && exit 0;
            curl -o /etc/yum.repos.d/cuda.repo
            https://developer.download.nvidia.com/compute/cuda/repos/rhel8/x86_64/cuda-rhel8.repo &&
            dnf install -y --nogpgcheck cuda-nvcc-12-8 cuda-cudart-devel-12-8'
          CIBW_ENVIRONMENT_LINUX: >-
            BUILD_WITH_CUDA=${{ matrix.cuda }}
            PATH=/usr/local/cuda/bin:$PATH
            CUDAToolkit_ROOT=/usr/local/cuda
            CMAKE_BUILD_PARALLEL_LEVEL=$CMAKE_BUILD_PARALLEL_LEVEL
            CMAKE_UNITY_BUILD=ON
            CMAKE_UNITY_BUILD_BATCH_SIZE=4
          CIBW_ENVIRONMENT_MACOS: >-
            BUILD_WITH_CUDA=${{ matrix.cuda }}
            MACOSX_DEPLOYMENT_TARGET=11.0
            CMAKE_BUILD_PARALLEL_LEVEL=$CMAKE_BUILD_PARALLEL_LEVEL
            CMAKE_UNITY_BUILD=ON
            CMAKE_UNITY_BUILD_BATCH_SIZE=4
          CIBW_ENVIRONMENT_WINDOWS: >-
            BUILD_WITH_CUDA=${{ matrix.cuda }}
            CMAKE_BUILD_PARALLEL_LEVEL=$CMAKE_BUILD_PARALLEL_LEVEL
            CMAKE_UNITY_BUILD=ON
            CMAKE_UNITY_BUILD_BATCH_SIZE=4
          # Windows-only: before each build, compute and export exact Python locations to CMake
          CIBW_BEFORE_BUILD_WINDOWS: |
            $code = @'
            import json, sys, sysconfig, os
            bp = sys.base_prefix
            inc = os.path.join(bp, "include")
            libname = sysconfig.get_config_var("LIBRARY")
            cands = []
            if libname:
                cands.append(os.path.join(bp, "libs", libname))
            v = f"python{sys.version_info[0]}{sys.version_info[1]}"
            cands += [os.path.join(bp, "libs", v + ".lib"), os.path.join(bp, "libs", v + "_d.lib")]
            lib = next((c for c in cands if os.path.exists(c)), "")
            print(json.dumps({"exe": sys.executable, "bp": bp, "inc": inc, "lib": lib, "cands": cands}))
            '@
            $info = python -c $code | ConvertFrom-Json
            if (-not $info.lib) {
              Write-Host "Candidate import libraries:"
              $info.cands | ForEach-Object { Write-Host "  - $_" }
              throw "Could not locate Python import library (.lib) under $($info.bp)\libs"
            }
            $args = @(
              '-DPython3_FIND_STRATEGY=LOCATION',
              '-DPython3_FIND_REGISTRY=NEVER',
              "-DPython3_EXECUTABLE=$($info.exe)",
              "-DPython3_LIBRARY=$($info.lib)",
              "-DPython3_INCLUDE_DIR=$($info.inc)"
            ) -join ' '
            if ($env:CMAKE_ARGS) {
              $env:CMAKE_ARGS = "$env:CMAKE_ARGS $args"
            } else {
              $env:CMAKE_ARGS = $args
            }
            Write-Host "CMAKE_ARGS -> $env:CMAKE_ARGS"
      

      - name: Save CUDA toolkit cache (Windows)
        if: always() && runner.os == 'Windows' && steps.cache-cuda.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.8
          key: cuda-12.8.0-windows-nvcc-cudart-vsint

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 1

  merge_artifacts:
    runs-on: ubuntu-latest
    needs: build_wheels
    steps:
      - name: Merge Artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: wheels
          pattern: "wheels-*"
          retention-days: 2
