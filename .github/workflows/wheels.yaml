name: BuildWheels

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build_wheels_CPU:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-22.04-arm, macos-14, macos-15-intel, macos-26, windows-2025]
    
    env: 
      BUILD_WITH_CUDA: 0

    steps:

      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      
      #- name: Change project name (Windows)
      #  run: powershell -Command "(gc pyproject.toml) -replace 'masspcf', 'masspcf-cpu' | Out-File -encoding ASCII pyproject.toml"
      #  if: runner.os == 'Windows'
      
      #- name: Change project name (UNIX)
      #  run: sed -i -e 's/masspcf/masspcf-cpu/g' pyproject.toml
      #  if: runner.os != 'Windows'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set build parallelism
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            CORES=$NUMBER_OF_PROCESSORS
          else
            CORES=$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)
          fi
          echo "CMAKE_BUILD_PARALLEL_LEVEL=$CORES" >> $GITHUB_ENV
          echo "Using $CORES core(s) to build..."

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        env:
          CIBW_BUILD_VERBOSITY: 1
          CIBW_ENVIRONMENT: >-
            BUILD_WITH_CUDA=0
            MACOSX_DEPLOYMENT_TARGET=11.0
            CMAKE_BUILD_PARALLEL_LEVEL=$CMAKE_BUILD_PARALLEL_LEVEL
            CMAKE_UNITY_BUILD=ON
            CMAKE_UNITY_BUILD_BATCH_SIZE=4
          CIBW_BUILD_FRONTEND: "build[uv]"
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"

      - uses: actions/upload-artifact@v4
        with: 
          name: cpu-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 1
  
  merge_cpu_artifacts:
    runs-on: ubuntu-latest
    needs: build_wheels_CPU
    steps:
      - name: Merge Artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: cpu-wheels
          retention-days: 2
    
