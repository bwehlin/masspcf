name: Analysis

on: [push, workflow_dispatch]

jobs:
  memory_check:
    name: Memory check on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ ubuntu-24.04 ]

    env:
      BUILD_WITH_CUDA: 0
      MINIMAL_MODULE_BUILD: 1
      SKIP_STUBGEN: 1
      SKIP_BACK_COPY: 1

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install numpy tqdm pytest ValgrindCI # better way to do this?

      - name: Install Valgrind and Debug Symbols
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind libc6-dbg

      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Debug

      - name: Build module
        run: cmake --build build -j $(nproc)

      - name: Install module
        run: cmake --install build

      - name: Run valgrind
        continue-on-error: true
        run: |
          cd test
          mkdir reports
          valgrind --xml=yes --xml-file=reports/vg-pytest.xml python -m pytest . -vv -s
          valgrind --xml=yes --xml-file=reports/vg-gtest.xml ../build/mpcf_test

      - name: Generate HTML Reports
        run: |
          cd test/reports
          echo "-------------- Pytest -----------------"
          valgrind-ci vg-pytest.xml --output-dir=vg_pytest
          valgrind-ci vg-gtest.xml --output-dir=vg_gtest

      - uses: actions/upload-artifact@v4
        with:
          name: valgrind-output
          path: test/reports/*
          retention-days: 1
