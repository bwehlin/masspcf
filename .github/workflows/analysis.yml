name: Analysis

on: [push, workflow_dispatch]

jobs:
  memory_check:
    name: Memory check on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ ubuntu-24.04 ]

    env:
      BUILD_WITH_CUDA: 0
      MINIMAL_MODULE_BUILD: 1

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install numpy tqdm # better way to do this?

      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Debug

      - name: Build module
        run: cmake --build build

