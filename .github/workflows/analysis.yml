name: Analysis

on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  coverage_report:
    name: Coverage report on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ ubuntu-24.04 ]

    env:
      BUILD_WITH_CUDA: 0
      MINIMAL_MODULE_BUILD: 1
      SKIP_STUBGEN: 1
      SKIP_BACK_COPY: 1
      ENABLE_COVERAGE: 1

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install numpy tqdm pytest pytest-cov gcovr

      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Debug

      - name: Build module
        run: cmake --build build -j $(nproc)

      - name: Install module
        run: cmake --install build

      - name: Run C++ test suite
        run: |
          cd test
          ../build/mpcf_test || true

      - name: Run Python test suite
        run: |
          mkdir -p covreport/python
          cd test
          python -m pytest . \
            --cov=masspcf \
            --cov-report=html:../covreport/python \
            --cov-report=json:../covreport/python/coverage.json \
            --cov-report=term || true
          # Ensure the html report exists even if coverage data is empty
          if [ ! -f "../covreport/python/index.html" ]; then
            python -m coverage html --directory=../covreport/python || true
          fi

      - name: Create C++ coverage report
        run: |
          mkdir -p covreport/cpp
          cd covreport/cpp
          gcovr --gcov-ignore-parse-errors=negative_hits.warn_once_per_file \
            -r . --object-directory ../../build \
            --filter ../../include/ --filter ../../src/ \
            --html-details coverage.html \
            --json-summary coverage-summary.json \
            --print-summary
          gcovr --gcov-ignore-parse-errors=negative_hits.warn_once_per_file \
            -r . --object-directory ../../build \
            --filter ../../include/ --filter ../../src/ \
            --markdown >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: covreport/
          retention-days: 1

  memory_check:
    name: Memory check on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ ubuntu-24.04 ]

    env:
      BUILD_WITH_CUDA: 0
      MINIMAL_MODULE_BUILD: 1
      SKIP_STUBGEN: 1
      SKIP_BACK_COPY: 1
      PYTHONMALLOC: malloc

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install numpy tqdm pytest ValgrindCI

      - name: Install Valgrind and Debug Symbols
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind libc6-dbg

      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Debug

      - name: Build module
        run: cmake --build build -j $(nproc)

      - name: Install module
        run: cmake --install build

      - name: Create reports directory
        run: mkdir test/reports

      - name: Run valgrind on Pytest
        run: |
          cd test
          valgrind --xml=yes --xml-file=./reports/vg-pytest.xml python -m pytest . -vv -s || true
          valgrind-ci ./reports/vg-pytest.xml --summary >> $GITHUB_STEP_SUMMARY
          valgrind-ci ./reports/vg-pytest.xml --output-dir=./reports/vg_pytest

      - name: Run valgrind on GTest
        run: |
          cd test
          valgrind --xml=yes --xml-file=./reports/vg-gtest.xml ../build/mpcf_test || true
          valgrind-ci ./reports/vg-gtest.xml --summary >> $GITHUB_STEP_SUMMARY
          valgrind-ci ./reports/vg-gtest.xml --output-dir=./reports/vg_gtest

      - name: Run helgrind on Pytest
        run: |
          cd test
          valgrind --tool=helgrind --xml=yes --xml-file=./reports/hg-pytest.xml python -m pytest . -vv -s || true
          valgrind-ci ./reports/hg-pytest.xml --summary >> $GITHUB_STEP_SUMMARY
          valgrind-ci ./reports/hg-pytest.xml --output-dir=./reports/hg_pytest

      - name: Run helgrind on GTest
        run: |
          cd test
          valgrind --tool=helgrind --xml=yes --xml-file=./reports/hg-gtest.xml ../build/mpcf_test || true
          valgrind-ci ./reports/hg-gtest.xml --summary >> $GITHUB_STEP_SUMMARY
          valgrind-ci ./reports/hg-gtest.xml --output-dir=./reports/hg_gtest

      - name: Upload valgrind artifact
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-output
          path: test/reports/
          retention-days: 1

  publish:
    name: Publish reports to GitHub Pages
    runs-on: ubuntu-24.04
    needs: [coverage_report, memory_check]

    steps:
      - uses: actions/checkout@v6

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: covreport/

      - name: Download valgrind artifact
        uses: actions/download-artifact@v4
        with:
          name: valgrind-output
          path: valgrind/

      - name: Checkout gh-pages branch
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages-branch
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update report history and generate index
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d_%H-%M-%S')
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          REPORT_DIR="reports/${TIMESTAMP}_${SHORT_SHA}"

          mkdir -p "gh-pages-branch/${REPORT_DIR}/cpp"
          mkdir -p "gh-pages-branch/${REPORT_DIR}/python"
          mkdir -p "gh-pages-branch/${REPORT_DIR}/valgrind"
          mkdir -p "gh-pages-branch/${REPORT_DIR}/helgrind"

          cp -r covreport/cpp/. "gh-pages-branch/${REPORT_DIR}/cpp/"
          rm -f covreport/python/.gitignore
          cp -r covreport/python/. "gh-pages-branch/${REPORT_DIR}/python/"
          cp -r valgrind/vg_pytest/. "gh-pages-branch/${REPORT_DIR}/valgrind/vg_pytest/"
          cp -r valgrind/vg_gtest/. "gh-pages-branch/${REPORT_DIR}/valgrind/vg_gtest/"
          cp -r valgrind/hg_pytest/. "gh-pages-branch/${REPORT_DIR}/helgrind/hg_pytest/"
          cp -r valgrind/hg_gtest/. "gh-pages-branch/${REPORT_DIR}/helgrind/hg_gtest/"
          echo "${{ github.ref_name }}" > "gh-pages-branch/${REPORT_DIR}/branch"

          python3 .github/scripts/generate_coverage_index.py gh-pages-branch

      - name: Write coverage badge JSONs
        run: |
          CPP_COV=$(python3 -c "
          import json
          with open('covreport/cpp/coverage-summary.json') as f:
            d = json.load(f)
            print(f\"{d['line_percent']:.1f}\")
            ")

          PY_COV=$(python3 -c "
          import json
          with open('covreport/python/coverage.json') as f:
            d = json.load(f)
            print(f\"{d['totals']['percent_covered']:.1f}\")
            ")
          
                    for LANG in cpp py; do
                      if [ "$LANG" = "cpp" ]; then COV=$CPP_COV; LABEL="C++ coverage"; else COV=$PY_COV; LABEL="Python coverage"; fi
            COLOR=$(python3 -c "
            c = float('${COV}')
            print('brightgreen' if c >= 80 else 'yellow' if c >= 60 else 'red')
            ")
            echo "{\"schemaVersion\":1,\"label\":\"${LABEL}\",\"message\":\"${COV}%\",\"color\":\"${COLOR}\"}" \
              > gh-pages-branch/${LANG}-coverage-badge.json
          done

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages-branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "reports: add run for ${{ github.sha }}"
          git push