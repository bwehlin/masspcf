name: Analysis

on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  coverage_report:
    name: Coverage report on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ ubuntu-24.04 ]

    env:
      BUILD_WITH_CUDA: 0
      MINIMAL_MODULE_BUILD: 1
      SKIP_STUBGEN: 1
      SKIP_BACK_COPY: 1
      ENABLE_COVERAGE: 1

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install numpy tqdm pytest pytest-cov gcovr

      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Debug

      - name: Build module
        run: cmake --build build -j $(nproc)

      - name: Install module
        run: cmake --install build

      - name: Run C++ test suite
        run: |
          cd test
          ../build/mpcf_test || true

      - name: Run Python test suite
        run: |
          mkdir -p covreport/python
          cd test
          python -m pytest . --cov --cov-report=html:../covreport/python --cov-report=term || true
          # Ensure the html report exists even if coverage data is empty
          if [ ! -f "../covreport/python/index.html" ]; then
            python -m coverage html --directory=../covreport/python || true
          fi

      - name: Create C++ coverage report
        run: |
          mkdir -p covreport/cpp
          cd covreport/cpp
          gcovr --gcov-ignore-parse-errors=negative_hits.warn_once_per_file -r . --object-directory ../../build --filter ../../include/ --filter ../../src/ --html-details coverage.html --print-summary
          gcovr --gcov-ignore-parse-errors=negative_hits.warn_once_per_file -r . --object-directory ../../build --filter ../../include/ --filter ../../src/ --markdown >> $GITHUB_STEP_SUMMARY

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-branch
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update coverage history and generate index
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d_%H-%M-%S')
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          REPORT_DIR="reports/${TIMESTAMP}_${SHORT_SHA}"

          mkdir -p "gh-pages-branch/${REPORT_DIR}"
          cp -r covreport/. "gh-pages-branch/${REPORT_DIR}/"

          python3 .github/scripts/generate_coverage_index.py gh-pages-branch

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages-branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "coverage: add report for ${{ github.sha }}"
          git push

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: covreport/*
          retention-days: 1

  memory_check:
    name: Memory check on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ ubuntu-24.04 ]

    env:
      BUILD_WITH_CUDA: 0
      MINIMAL_MODULE_BUILD: 1
      SKIP_STUBGEN: 1
      SKIP_BACK_COPY: 1
      PYTHONMALLOC: malloc

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install numpy tqdm pytest ValgrindCI

      - name: Install Valgrind and Debug Symbols
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind libc6-dbg

      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Debug

      - name: Build module
        run: cmake --build build -j $(nproc)

      - name: Install module
        run: cmake --install build

      - name: Create reports directory
        run: mkdir test/reports

      - name: Run valgrind on Pytest
        run: |
          cd test
          valgrind --xml=yes --xml-file=./reports/vg-pytest.xml python -m pytest . -vv -s || true
          valgrind-ci ./reports/vg-pytest.xml --summary >> $GITHUB_STEP_SUMMARY
          valgrind-ci ./reports/vg-pytest.xml --output-dir=./reports/vg_pytest

      - name: Run valgrind on GTest
        run: |
          cd test
          valgrind --xml=yes --xml-file=./reports/vg-gtest.xml ../build/mpcf_test || true
          valgrind-ci ./reports/vg-gtest.xml --summary >> $GITHUB_STEP_SUMMARY
          valgrind-ci ./reports/vg-gtest.xml --output-dir=./reports/vg_gtest

      - uses: actions/upload-artifact@v4
        with:
          name: valgrind-output
          path: test/reports/*
          retention-days: 1