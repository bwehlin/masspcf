<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coverage Reports</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    {{style}}
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="eyebrow">C++ &amp; Python Coverage</div>
    <h1>Coverage<br /><span>Reports</span></h1>
    <p class="subtitle">Last {{max_reports}} runs — click a label to view that report</p>
  </header>

  <div class="reports-list">
    {{cards}}
  </div>

  <footer>
    <span><span class="dot"></span>Auto-generated on each push</span>
    <span>Keeping last {{max_reports}} reports</span>
  </footer>
</div>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.report-label[data-utc]').forEach(function (el) {
      var iso = el.getAttribute('data-utc');
      var sha = el.getAttribute('data-sha');
      if (!iso) return;
      var d = new Date(iso);
      var local = d.toLocaleString(undefined, {
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false
      });
      el.textContent = local + (sha ? ' — ' + sha : '');
    });
  });
</script>
</body>
</html>
