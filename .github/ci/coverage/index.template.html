<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analysis Reports</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    {{style}}
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="eyebrow">C++ &amp; Python Coverage &amp; Memory</div>
    <h1>Analysis<br /><span>Reports</span></h1>
    <p class="subtitle">Last {{max_reports}} runs — click a row to view that report</p>
  </header>

  <div class="reports-list">
    {{cards}}
  </div>

  <footer>
    <span><span class="dot"></span>Auto-generated on each push</span>
    <span>Keeping last {{max_reports}} reports</span>
  </footer>
</div>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    function timeAgo(date) {
      var seconds = Math.floor((Date.now() - date.getTime()) / 1000);
      if (seconds < 60) return 'just now';
      var minutes = Math.floor(seconds / 60);
      if (minutes < 60) return minutes + ' minute' + (minutes === 1 ? '' : 's') + ' ago';
      var hours = Math.floor(minutes / 60);
      if (hours < 24) return hours + ' hour' + (hours === 1 ? '' : 's') + ' ago';
      var days = Math.floor(hours / 24);
      return days + ' day' + (days === 1 ? '' : 's') + ' ago';
    }

    document.querySelectorAll('.report-label[data-utc]').forEach(function (el) {
      var iso = el.getAttribute('data-utc');
      var sha = el.getAttribute('data-sha');
      if (!iso) return;
      var d = new Date(iso);
      var local = d.toLocaleString(undefined, {
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false
      });
      el.textContent = local + (sha ? ' \u2014 ' + sha : '');

      var ago = document.createElement('div');
      ago.className = 'report-ago';
      ago.textContent = timeAgo(d);
      el.parentNode.insertBefore(ago, el.nextSibling);
    });
  });
</script>
</body>
</html>
